<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Pesanan</title>

<link rel="stylesheet" href="./detail.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<nav>
  <div class="logo">🍽️ Pataw Food</div>
  <div class="menu">
    <a href="index.html">Home</a>
    <a href="food.html">Food</a>
    <a href="#">Contact</a>

<section class="detail-container">

  <h1>Nasi Goreng Biasa</h1>

  <p class="desc">
Nasi goreng dengan telur yang di orak-arik dimasak di wajan panas menggunakan racikan bumbu khas rumahan. Setiap porsi disajikan hangat dengan cita rasa gurih yang seimbang, mengingatkan pada nasi goreng buatan rumah yang sederhana namun istimewa.
  </p>

  <div class="images">
    <img src="/image/nasgor biasa.jpeg">
    <img src="image/Nasgor biasa2.jpeg">
  </div>

  <div class="order-box">

    <label>Catatan Pesanan</label>
    <input type="text" id="note" placeholder="Contoh: tambah telur, pedas sedikit">

    <label>Jumlah</label>
    <input type="number" id="qty" value="1" min="1">

    <label>Total Harga (Rp)</label>
    <input type="text" id="total" readonly>

    <button onclick="sendWA()">Pesan Sekarang Via WhatsApp</button>

  </div>

</section>

<script>
const price = 10000;

const qtyInput = document.getElementById("qty");
const totalInput = document.getElementById("total");

function updateTotal(){
  const qty = qtyInput.value;
  const total = qty * price;
  totalInput.value = total.toLocaleString("id-ID");
}

qtyInput.addEventListener("input", updateTotal);
updateTotal();

function sendWA(){
  const qty = qtyInput.value;
  const note = document.getElementById("note").value;
  const total = qty * price;

  const message =
`Halo Pataw Food saya mau pesan:
Nasi Goreng Biasa
Jumlah: ${qty}
Catatan: ${note}
Total: Rp ${total.toLocaleString("id-ID")}`;

  const phone = "628811281317"; // GANTI NOMOR KAMU
  const url = `https://wa.me/628811281317?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
